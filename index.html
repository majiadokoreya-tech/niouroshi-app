<div id="view-top">
  <div class="nav-header"><span class="screen-title">荷卸し先</span></div>
  <div class="card-list" id="product-list"></div>
  <div class="backup-bar">
    <button class="backup-btn" onclick="exportJSON()">バックアップ保存</button>
    <button class="backup-btn" onclick="document.getElementById('imp').click()">バックアップ読込</button>
    <input type="file" id="imp" accept=".json" onchange="importJSON(event)">
  </div>
</div>

<div id="view-area" style="display:none">
  <div class="nav-header">
    <span class="back-btn" onclick="showTop()">＜ 戻る</span>
    <span class="screen-title" id="area-title"></span>
  </div>
  <div class="card-list" id="area-list"></div>
</div>

<div id="view-dest" style="display:none;padding-bottom:80px">
  <div class="nav-header">
    <span class="back-btn" onclick="backFromDest()">＜ 戻る</span>
    <span class="screen-title" id="dest-title"></span>
  </div>
  <div class="card-list" id="dest-list"></div>
</div>

<div id="view-detail" style="display:none;padding-bottom:80px">
  <div class="nav-header">
    <span class="back-btn" onclick="backFromDetail()">＜ 戻る</span>
    <span class="screen-title" id="detail-title"></span>
    <span class="edit-link" onclick="showForm('edit')">編集</span>
  </div>
  <div id="detail-body"></div>
</div>

<div id="view-form" style="display:none;padding-bottom:80px">
  <div class="nav-header">
    <span class="back-btn" onclick="cancelForm()">キャンセル</span>
    <span class="screen-title" id="form-title">客先を追加</span>
  </div>
  <div style="margin-top:8px">
    <div class="form-section">
      <div class="form-label">料金表から選択（任意）</div>
      <button class="rate-select-btn" onclick="openRateModal()">
        <span id="rate-select-label">料金表から客先を選ぶ</span>
        <span style="color:#ccc;font-size:18px;flex-shrink:0">›</span>
      </button>
      <div class="form-hint">選択すると客先名・時間・手当が自動入力されます</div>
    </div>
    <div class="form-section" id="f-area-sec">
      <div class="form-label">エリア</div>
      <select class="form-select" id="f-area"></select>
    </div>
    <div class="form-section">
      <div class="form-label">客先名</div>
      <input class="form-input" id="f-name" type="text" placeholder="例：〇〇化学工業">
    </div>
    <div class="form-section">
      <div class="form-label">運行手当</div>
      <input class="form-input" id="f-allowance" type="text" inputmode="numeric" placeholder="例：3000">
      <div class="form-hint">円（数字のみ）</div>
    </div>
    <div class="form-section">
      <div class="form-label">始業・終業時間</div>
      <div class="time-row">
        <select class="form-select" id="f-start"></select>
        <select class="form-select" id="f-end"></select>
      </div>
      <div class="time-labels"><span>始業</span><span>終業</span></div>
    </div>
    <div class="form-section">
      <div class="form-label">メモ</div>
      <textarea class="form-textarea" id="f-notes" placeholder="注意事項や備考など"></textarea>
    </div>
    <div style="padding:8px 0 16px">
      <button class="save-btn" onclick="saveDest()">保存する</button>
    </div>
  </div>
</div>

<div id="rate-modal" class="modal-overlay" onclick="closeRateModalBg(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title" id="rate-modal-title">料金表から選択</span>
      <span class="modal-close" onclick="closeRateModal()">閉じる</span>
    </div>
    <div class="modal-search">
      <input type="text" id="rate-search" placeholder="客先名で絞り込み" oninput="renderRateList()" autocomplete="off">
    </div>
    <div class="modal-list" id="rate-list"></div>
  </div>
</div>

let db={ester:{},sulfuric:[],polymer:{}};
let curProduct=0,curArea=null,curKey=null,editMode=false;

function initDB(){
  AREAS.forEach(a=>{if(!db.ester[a])db.ester[a]=[];if(!db.polymer[a])db.polymer[a]=[];});
  if(!Array.isArray(db.sulfuric))db.sulfuric=[];
}
function loadDB(){
  try{const r=localStorage.getItem('niouroshi-v2');if(r)db=JSON.parse(r);}catch(e){}
  initDB();
}
function saveDB(){localStorage.setItem('niouroshi-v2',JSON.stringify(db));}
function getList(tab,area){if(tab===0)return db.ester[area]||[];if(tab===1)return db.sulfuric;if(tab===2)return db.polymer[area]||[];return[];}
function setList(tab,area,arr){if(tab===0)db.ester[area]=arr;else if(tab===1)db.sulfuric=arr;else if(tab===2)db.polymer[area]=arr;}
function totalCount(tab){if(!HAS_AREA[tab])return getList(tab,null).length;return AREAS.reduce((s,a)=>s+getList(tab,a).length,0);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function encKey(tab,area,idx){const s=JSON.stringify({tab,area,idx});return btoa(unescape(encodeURIComponent(s)));}
function decKey(k){return JSON.parse(decodeURIComponent(escape(atob(k))));}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function hideAll(){['view-top','view-area','view-dest','view-detail','view-form'].forEach(hide);}

function buildTimeOptions(sel,minH,maxH){
  let o='<option value="">--</option>';
  const lo=minH!==undefined?minH:0;
  const hi=maxH!==undefined?maxH:23;
  for(let h=lo;h<=hi;h++){
    for(let m=0;m<60;m+=15){
      if(h===hi&&m>0)break;
      const v=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      o+=`<option value="${v}"${v===sel?' selected':''}>${v}</option>`;
    }
  }
  return o;
}
function buildAllTimeOptions(sel){
  let o='<option value="">--</option>';
  for(let h=0;h<24;h++){
    for(let m=0;m<60;m+=15){
      const v=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      o+=`<option value="${v}"${v===sel?' selected':''}>${v}</option>`;
    }
  }
  return o;
}
function initTimeSelects(s,e){
  document.getElementById('f-start').innerHTML=buildTimeOptions(s||'',10,20);
  document.getElementById('f-end').innerHTML=buildTimeOptions(e||'',14,23);
}
function setTimeSelectsFromRate(s,e){
  document.getElementById('f-start').innerHTML=buildAllTimeOptions(s||'');
  document.getElementById('f-end').innerHTML=buildAllTimeOptions(e||'');
}

function showTop(){
  hideAll();show('view-top');
  document.getElementById('product-list').innerHTML=PRODUCTS.map((p,i)=>`
    <div class="row-card" onclick="showArea(${i})">
      <div class="row-card-body"><div class="row-card-name">${p}</div><div class="row-card-sub">${totalCount(i)}件登録</div></div>
      <div class="row-card-arrow">›</div>
    </div>`).join('');
}
function showArea(tabIdx){
  if(tabIdx!==undefined)curProduct=tabIdx;
  if(!HAS_AREA[curProduct]){showDest(null);return;}
  hideAll();show('view-area');
  document.getElementById('area-title').textContent=PRODUCTS[curProduct];
  document.getElementById('area-list').innerHTML=AREAS.map(area=>{
    const cnt=getList(curProduct,area).length;
    return`<div class="row-card" onclick="showDest('${area}')">
      <div class="row-card-body"><div class="row-card-name">${area}</div><div class="row-card-sub">${cnt}件</div></div>
      <div class="row-card-arrow">›</div></div>`;
  }).join('');
}
function showDest(area){
  curArea=area;hideAll();show('view-dest');
  const label=HAS_AREA[curProduct]&&area?`${PRODUCTS[curProduct]} › ${area}`:PRODUCTS[curProduct];
  document.getElementById('dest-title').textContent=label;
  const list=getList(curProduct,area);
  let html='';
  if(!list.length)html='<div class="empty-hint">客先が登録されていません</div>';
  list.forEach((d,i)=>{
    const key=encKey(curProduct,area,i);
    const sub=[];
    if(d.allowance)sub.push('手当 ¥'+Number(d.allowance).toLocaleString());
    if(d.start||d.end)sub.push([d.start,d.end].filter(Boolean).join(' 〜 '));
    html+=`<div class="row-card" onclick="showDetail('${key}')">
      <div class="row-card-body">
        <div class="row-card-name">${esc(d.name||'（名称未設定）')}</div>
        ${sub.length?`<div class="row-card-sub">${esc(sub.join('　'))}</div>`:''}
      </div><div class="row-card-arrow">›</div></div>`;
  });
  html+=`<div class="add-card" onclick="showForm('new')"><div class="add-card-icon">+</div><span>客先を追加</span></div>`;
  document.getElementById('dest-list').innerHTML=html;
}
function backFromDest(){if(HAS_AREA[curProduct]){hideAll();show('view-area');showArea();}else{showTop();}}

function showDetail(key){
  curKey=key;
  const {tab,area,idx}=decKey(key);
  const d=getList(tab,area)[idx];if(!d)return;
  document.getElementById('detail-title').textContent=d.name||'（名称未設定）';
  let html='<div style="margin-top:8px">';
  html+=`<div class="section"><div class="section-label">基本情報</div>`;
  html+=`<div class="info-row"><span class="info-key">品目</span><span class="info-val">${PRODUCTS[tab]}</span></div>`;
  if(HAS_AREA[tab]&&area)html+=`<div class="info-row"><span class="info-key">エリア</span><span class="info-val">${esc(area)}</span></div>`;
  html+=`</div><div class="section"><div class="section-label">運行情報</div>`;
  if(d.allowance)html+=`<div class="info-row"><span class="info-key">運行手当</span><span class="info-val">¥${Number(d.allowance).toLocaleString()}</span></div>`;
  if(d.start)html+=`<div class="info-row"><span class="info-key">始業</span><span class="info-val">${esc(d.start)}</span></div>`;
  if(d.end)html+=`<div class="info-row"><span class="info-key">終業</span><span class="info-val">${esc(d.end)}</span></div>`;
  if(!d.allowance&&!d.start&&!d.end)html+=`<div style="font-size:13px;color:#ccc">未登録</div>`;
  html+=`</div>`;
  if(d.notes)html+=`<div class="section"><div class="section-label">メモ</div><div class="note-box">${esc(d.notes)}</div></div>`;
  html+=`<button class="del-btn" onclick="deleteDest()">この客先を削除</button></div>`;
  document.getElementById('detail-body').innerHTML=html;
  hideAll();show('view-detail');
}
function backFromDetail(){hideAll();show('view-dest');showDest(curArea);}

function showForm(mode){
  editMode=(mode==='edit');
  document.getElementById('form-title').textContent=editMode?'編集':'客先を追加';
  let d=null,tab=curProduct,area=curArea;
  if(editMode&&curKey){const k=decKey(curKey);tab=k.tab;area=k.area;d=getList(k.tab,k.area)[k.idx];}
  const areaSec=document.getElementById('f-area-sec');
  if(HAS_AREA[tab]){
    areaSec.style.display='block';
    document.getElementById('f-area').innerHTML=AREAS.map(a=>`<option value="${a}"${a===area?' selected':''}>${a}</option>`).join('');
  } else {
    areaSec.style.display='none';
  }
  document.getElementById('f-name').value=d?d.name||'':'';
  document.getElementById('f-allowance').value=d?d.allowance||'':'';
  document.getElementById('f-notes').value=d?d.notes||'':'';
  document.getElementById('rate-select-label').textContent='料金表から客先を選ぶ';
  initTimeSelects(d?d.start:'',d?d.end:'');
  hideAll();show('view-form');
}
function cancelForm(){
  hideAll();
  if(editMode&&curKey){showDetail(curKey);}else{showDest(curArea);}
}
function saveDest(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('客先名を入力してください');return;}
  const d={name,allowance:document.getElementById('f-allowance').value.trim(),start:document.getElementById('f-start').value,end:document.getElementById('f-end').value,notes:document.getElementById('f-notes').value.trim()};
  if(editMode&&curKey){
    const k=decKey(curKey);
    const newArea=HAS_AREA[k.tab]?document.getElementById('f-area').value:k.area;
    if(newArea!==k.area){
      // エリア変更：旧エリアから削除して新エリアに追加
      const oldList=getList(k.tab,k.area);
      oldList.splice(k.idx,1);setList(k.tab,k.area,oldList);
      const newList=getList(k.tab,newArea);
      newList.push(d);setList(k.tab,newArea,newList);
      saveDB();
      curArea=newArea;
      curKey=encKey(k.tab,newArea,newList.length-1);
    } else {
      const list=getList(k.tab,k.area);list[k.idx]=d;setList(k.tab,k.area,list);saveDB();
      curKey=encKey(k.tab,k.area,k.idx);
    }
    hideAll();showDetail(curKey);
  } else {
    const list=getList(curProduct,curArea);list.push(d);setList(curProduct,curArea,list);saveDB();
    hideAll();showDest(curArea);
  }
}
function deleteDest(){
  if(!confirm('この客先を削除しますか？'))return;
  const {tab,area,idx}=decKey(curKey);const list=getList(tab,area);
  list.splice(idx,1);setList(tab,area,list);saveDB();
  curKey=null;curArea=area;curProduct=tab;hideAll();showDest(area);
}

function getRateKey(){return['ester','sulfuric','polymer'][curProduct];}
function openRateModal(){
  document.getElementById('rate-modal-title').textContent=PRODUCTS[curProduct]+'の料金表';
  document.getElementById('rate-search').value='';
  renderRateList();
  document.getElementById('rate-modal').classList.add('open');
}
function closeRateModal(){document.getElementById('rate-modal').classList.remove('open');}
function closeRateModalBg(e){if(e.target===document.getElementById('rate-modal'))closeRateModal();}
function renderRateList(){
  const q=document.getElementById('rate-search').value.trim().toLowerCase();
  const all=RATE_DATA[getRateKey()]||[];
  const list=all.filter(r=>!q||r.name.toLowerCase().includes(q));
  const el=document.getElementById('rate-list');
  if(!list.length){el.innerHTML='<div class="empty-hint">該当なし</div>';return;}
  el.innerHTML=list.map(r=>{
    const origIdx=all.indexOf(r);
    return`<div class="modal-item" onclick="selectRate(${origIdx})">
      <div>
        <div class="modal-item-name">${esc(r.name)}</div>
        <div class="modal-item-sub">${r.start||'--'} 〜 ${r.end||'--'}</div>
      </div>
      <div class="modal-item-price">¥${Number(r.allowance).toLocaleString()}</div>
    </div>`;
  }).join('');
}
function selectRate(idx){
  const r=(RATE_DATA[getRateKey()]||[])[idx];if(!r)return;
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-allowance').value=r.allowance;
  document.getElementById('rate-select-label').textContent=r.name;
  setTimeSelectsFromRate(r.start,r.end);
  closeRateModal();
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');const d=new Date();
  a.href=url;a.download=`niouroshi_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const parsed=JSON.parse(ev.target.result);if(confirm('現在のデータを上書きしますか？')){db=parsed;initDB();saveDB();showTop();alert('読み込み完了しました');}}
    catch{alert('ファイルの読み込みに失敗しました');}
  };
  r.readAsText(file);e.target.value='';
}

loadDB();showTop();
